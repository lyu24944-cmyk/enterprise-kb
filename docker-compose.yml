services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/app.db
      - UPLOAD_DIR=/app/data/files
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - FAISS_INDEX_PATH=/app/data/faiss/index.bin
      - CORS_ORIGINS=http://localhost,http://localhost:5173

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
